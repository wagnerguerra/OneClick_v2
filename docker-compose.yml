services:
  postgres:
    image: postgres:16-alpine
    container_name: saas-postgres
    restart: unless-stopped
    ports:
      # Host 5435 (não 5432) — evita colisão com Postgres do sistema e isola
      # do server-manager. Dentro do container segue 5432. Ver port-registry.json.
      - "5435:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: saas_erp
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: saas-redis
    restart: unless-stopped
    ports:
      # Host 6380 (não 6379) — 6379 já é usado pelo webapp-redis. Ver port-registry.json.
      - "6380:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
