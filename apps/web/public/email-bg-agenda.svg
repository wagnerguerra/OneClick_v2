<svg xmlns="http://www.w3.org/2000/svg" width="260" height="260" viewBox="0 0 260 260">
  <g fill="#ffffff" fill-opacity="0.1">
    <!-- Calendário grande -->
    <rect x="28" y="28" width="52" height="48" rx="6"/>
    <rect x="28" y="28" width="52" height="12" rx="6" fill-opacity="0.16"/>
    <rect x="36" y="22" width="4" height="12" rx="2" fill-opacity="0.16"/>
    <rect x="68" y="22" width="4" height="12" rx="2" fill-opacity="0.16"/>
    <circle cx="42" cy="54" r="2"/>
    <circle cx="54" cy="54" r="2"/>
    <circle cx="66" cy="54" r="2"/>
    <circle cx="42" cy="64" r="2"/>
    <circle cx="54" cy="64" r="2"/>
    <!-- Relógio -->
    <circle cx="200" cy="60" r="22" fill="none" stroke="#ffffff" stroke-opacity="0.16" stroke-width="2"/>
    <path d="M200 46 v14 l9 6" stroke="#ffffff" stroke-opacity="0.22" stroke-width="2.2" fill="none" stroke-linecap="round"/>
    <!-- Check -->
    <path d="M115 130 l6 6 l12 -14" stroke="#ffffff" stroke-opacity="0.18" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Calendário pequeno -->
    <rect x="180" y="180" width="38" height="34" rx="4"/>
    <rect x="180" y="180" width="38" height="9" rx="4" fill-opacity="0.16"/>
    <!-- Dots decorativos -->
    <circle cx="60" cy="180" r="3"/>
    <circle cx="90" cy="200" r="2.5"/>
    <circle cx="150" cy="220" r="2"/>
    <circle cx="230" cy="130" r="2.5"/>
    <circle cx="40" cy="130" r="2"/>
    <!-- Linhas sutis -->
    <path d="M150 70 h28" stroke="#ffffff" stroke-opacity="0.14" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M150 80 h20" stroke="#ffffff" stroke-opacity="0.12" stroke-width="1.5" stroke-linecap="round"/>
  </g>
</svg>
